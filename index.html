<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Univision Go - Download</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f7;
      color: #1d1d1f;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6e6e73; }
    .spinner {
      border: 3px solid #e5e5ea;
      border-top: 3px solid #007aff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px 0;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    a {
      color: #007aff;
      text-decoration: none;
      margin: 8px;
    }
  </style>
</head>
<body>
  <h1>Univision Go</h1>
  <div class="spinner"></div>
  <p>Redirecting to the app store...</p>
  <div id="fallback" style="display:none; margin-top: 20px;">
    <p>Not redirected? Choose your platform:</p>
    <a href="https://apps.apple.com/mn/app/univision-go/id6754588271">App Store</a>
    |
    <a href="https://play.google.com/store/apps/details?id=com.univision.ss">Google Play</a>
  </div>

  <a id="open" href="https://ss.univision.mn/">Open in app</a>
<script>

    if (/Android/i.test(navigator.userAgent)) {

      document.getElementById('open').href =

        'intent://open#Intent;scheme=unvss;package=com.univision.ss;' +

        'S.browser_fallback_url=https%3A%2F%2Fplay.google.com%2Fstore%2Fapps%2Fdetails%3Fid%3Dcom.univision.ss;end';

    }
</script>

      if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
        // window.location.href = iosUrl;
      } else if (/android/i.test(ua)) {
        // window.location.href = androidUrl;
      } else {
        document.getElementById("fallback").style.display = "block";
      }

      setTimeout(function() {
        document.getElementById("fallback").style.display = "block";
      }, 2000);
    })();
  </script>
</body>
</html>
